# docker-compose.yml - Environnement de développement local CRM SaaS
#
# Deux modes disponibles :
#
#   docker compose up --build 
#   docker compose watch 

services:

  # ──────────────────────────────────────────
  # Backend NestJS
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      # Seules les vars qui n'existent pas dans backend/.env vont ici
      - CHOKIDAR_USEPOLLING=true
    develop:
      watch:
        # Synchronise les fichiers sources sans rebuild
        - action: sync
          path: ./backend/src
          target: /app/src
          ignore:
            - node_modules/
        # Rebuild uniquement si package.json change (nouvelle dépendance)
        - action: rebuild
          path: ./backend/package.json
    networks:
      - crm-network

  # ──────────────────────────────────────────
  # Frontend Next.js
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ./frontend/.env.local
    environment:
      # Seules les vars absentes de frontend/.env.local vont ici
      - API_INTERNAL_URL=http://backend:3001
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      backend:
        condition: service_started
    develop:
      watch:
        # Synchronise tout le code source
        - action: sync
          path: ./frontend/src
          target: /app/src
          ignore:
            - node_modules/
        # Synchronise les fichiers de config Next.js (tailwind, tsconfig…)
        - action: sync
          path: ./frontend/public
          target: /app/public
        # Rebuild si les dépendances changent
        - action: rebuild
          path: ./frontend/package.json
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge