name: Generate Mermaid Diagrams

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.mermaid'
      - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest
    # Donne les droits d'écriture au token GITHUB_TOKEN par défaut
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Utilise le token avec les droits d'écriture pour pouvoir push
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── MERMAID CLI ─────────────────────────────────────────────────────────
      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      # Puppeteer config (sandbox désactivé, requis sur GitHub Actions)
      - name: Create puppeteer-config.json
        run: echo '{"args":["--no-sandbox"]}' > puppeteer-config.json

      # ─── NETTOYAGE DES FENCES ────────────────────────────────────────────────
      # Certains éditeurs sauvegardent les fichiers .mermaid avec des fences
      # ```mermaid ... ``` — mmdc n'accepte que le code brut, on les retire.
      - name: Strip markdown fences from all .mermaid files
        run: |
          find docs -name "*.mermaid" | while read file; do
            sed -i '/^```/d' "$file"
            sed -i '/./,$!d' "$file"
          done

      # ─── MCD ─────────────────────────────────────────────────────────────────
      - name: Generate PNG — docs/mcd.mermaid
        run: |
          if [ -f docs/mcd.mermaid ]; then
            mmdc \
              -p puppeteer-config.json \
              -i docs/mcd.mermaid \
              -o docs/mcd.png \
              -t forest \
              -b white
            echo "docs/mcd.png généré"
          else
            echo "WARN: docs/mcd.mermaid introuvable, étape ignorée"
          fi

      # ─── USE CASES ───────────────────────────────────────────────────────────
      - name: Generate PNGs — docs/use_cases/*.mermaid
        run: |
          mkdir -p docs/use_cases
          shopt -s nullglob
          files=(docs/use_cases/*.mermaid)
          if [ ${#files[@]} -eq 0 ]; then
            echo "WARN: Aucun fichier dans docs/use_cases/, étape ignorée"
            exit 0
          fi
          for file in "${files[@]}"; do
            output="${file%.mermaid}.png"
            echo "INFO: Génération de $output"
            # || true : un diagramme invalide ne bloque pas les suivants
            mmdc \
              -p puppeteer-config.json \
              -i "$file" \
              -o "$output" \
              -t dark \
              -b white \
              -w 1200 \
              -H 900 || true
            echo "$output généré"
          done

      # ─── SÉQUENCES ───────────────────────────────────────────────────────────
      - name: Generate PNGs — docs/sequences/*.mermaid
        run: |
          mkdir -p docs/sequences
          shopt -s nullglob
          files=(docs/sequences/*.mermaid)
          if [ ${#files[@]} -eq 0 ]; then
            echo "WARN: Aucun fichier dans docs/sequences/, étape ignorée"
            exit 0
          fi
          for file in "${files[@]}"; do
            output="${file%.mermaid}.png"
            echo "INFO: Génération de $output"
            mmdc \
              -p puppeteer-config.json \
              -i "$file" \
              -o "$output" \
              -t neutral \
              -b white \
              -w 1400 \
              -H 1000 || true
            echo "$output généré"
          done

      # ─── PDF ─────────────────────────────────────────────────────────────────
      # --resource-path : liste tous les dossiers où Pandoc cherche les images.
      #   '.' = racine, 'docs' = doc_technique.md, plus les sous-dossiers PNG.
      # --pdf-engine=lualatex : supporte les PNG (y compris fond blanc/opaque)
      #   contrairement à pdflatex qui rejette certains PNG générés par mmdc.
      - name: Render PDF with Pandoc
        uses: docker://pandoc/latex:latest
        with:
          args: >-
            --from=markdown
            --to=pdf
            --output=docs/doc_technique.pdf
            --pdf-engine=lualatex
            --resource-path=.:docs:docs/use_cases:docs/sequences
            --standalone
            docs/doc_technique.md

      # ─── VÉRIFICATION ────────────────────────────────────────────────────────
      - name: Check generated files
        run: |
          echo "=== PNG use_cases ==="
          ls -lh docs/use_cases/*.png 2>/dev/null || echo "Aucun PNG use_cases"
          echo "=== PNG sequences ==="
          ls -lh docs/sequences/*.png 2>/dev/null || echo "Aucun PNG sequences"
          echo "=== PNG MCD ==="
          ls -lh docs/mcd.png 2>/dev/null || echo "PNG MCD manquant !"
          echo "=== PDF ==="
          ls -lh docs/doc_technique.pdf 2>/dev/null || echo "PDF manquant !"

      # ─── COMMIT ──────────────────────────────────────────────────────────────
      - name: Commit and push generated PNGs and PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add \
            docs/mcd.png \
            docs/use_cases/*.png \
            docs/sequences/*.png \
            docs/doc_technique.pdf \
            2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement à commiter"
          else
            git commit -m "docs: update automated diagrams [skip ci]"
            git push
          fi