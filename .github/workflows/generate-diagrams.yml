name: Generate Mermaid Diagrams

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.mermaid'
      - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest
    # Donne les droits d'écriture au token GITHUB_TOKEN par défaut
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Utilise le token avec les droits d'écriture pour pouvoir push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      # Puppeteer config (désactive le sandbox requis sur GitHub Actions)
      - name: Create puppeteer-config.json
        run: echo '{"args":["--no-sandbox"]}' > puppeteer-config.json

      # ─── Fonction de nettoyage ───────────────────────────────────────────────
      # Certains éditeurs sauvegardent les fichiers .mermaid avec des fences
      # ```mermaid ... ``` — mmdc n'accepte que le code brut, on les retire.
      - name: Strip markdown fences from all .mermaid files
        run: |
          find docs -name "*.mermaid" | while read file; do
            # Supprime la ligne ouvrante ```mermaid (ou ```) et la ligne fermante ```
            sed -i '/^```/d' "$file"
            # Supprime les éventuelles lignes vides en début de fichier
            sed -i '/./,$!d' "$file"
          done

      # ─── MCD ────────────────────────────────────────────────────────────────
      - name: Generate PNG — docs/mcd.mermaid
        run: |
          if [ -f docs/mcd.mermaid ]; then
            mmdc \
              -p puppeteer-config.json \
              -i docs/mcd.mermaid \
              -o docs/mcd.png \
              -t forest \
              -b transparent
            echo "docs/mcd.png généré"
          else
            echo "WARN: docs/mcd.mermaid introuvable, étape ignorée"
          fi

      # ─── USE CASES ──────────────────────────────────────────────────────────
      - name: Generate PNGs — docs/use_cases/*.mermaid
        run: |
          mkdir -p docs/use_cases
          shopt -s nullglob
          files=(docs/use_cases/*.mermaid)
          if [ ${#files[@]} -eq 0 ]; then
            echo "WARN: Aucun fichier dans docs/use_cases/, étape ignorée"
            exit 0
          fi
          for file in "${files[@]}"; do
            output="${file%.mermaid}.png"
            echo "INFO: Génération de $output"
            mmdc \
              -p puppeteer-config.json \
              -i "$file" \
              -o "$output" \
              -t dark \
              -b transparent \
              --width 1200 \
              --height 900
            echo "$output généré"
          done

      # ─── SÉQUENCES ──────────────────────────────────────────────────────────
      - name: Generate PNGs — docs/sequences/*.mermaid
        run: |
          mkdir -p docs/sequences
          shopt -s nullglob
          files=(docs/sequences/*.mermaid)
          if [ ${#files[@]} -eq 0 ]; then
            echo "WARN: Aucun fichier dans docs/sequences/, étape ignorée"
            exit 0
          fi
          for file in "${files[@]}"; do
            output="${file%.mermaid}.png"
            echo "INFO: Génération de $output"
            mmdc \
              -p puppeteer-config.json \
              -i "$file" \
              -o "$output" \
              -t neutral \
              -b transparent \
              --width 1400 \
              --height 1000
            echo "$output généré"
          done

      - name: Checkout code
        uses: actions/checkout@v4

      # Étape de vérification (Debug) pour voir si le dossier doc existe
      - name: Prepare environment
        run: mkdir -p doc

      - name: Render PDF with Pandoc
        uses: docker://pandoc/latex:latest
        with:
          args: >-
            --from=markdown
            --to=pdf
            --output=docs/doc_technique.pdf
            --pdf-engine=pdflatex
            --resource-path=.:docs
            --standalone
            docs/doc_technique.md

      # Vérification de l'existence du fichier avant l'upload
      - name: Check file existence
        run: ls -l docs/doc_technique.pdf

      # ─── COMMIT ─────────────────────────────────────────────────────────────
      - name: Commit and push generated PNGs and PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Ajoute tous les PNG générés (use_cases, sequences, mcd)
          git add docs/mcd.png docs/use_cases/*.png docs/sequences/*.png docs/doc_technique.pdf 2>/dev/null || true
          # Ne commit que s'il y a des changements réels
          if git diff --cached --quiet; then
            echo "Aucun changement à commiter"
          else
            git commit -m "docs: update automated diagrams [skip ci]"
            git push
          fi